<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420">
  <defs>
    <radialGradient id="ballGrad" cx="38%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#FFD84D"/>
      <stop offset="40%" stop-color="#FFA020"/>
      <stop offset="100%" stop-color="#E05000"/>
    </radialGradient>
    <radialGradient id="globeGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#FF6A1A"/>
      <stop offset="100%" stop-color="#CC2200"/>
    </radialGradient>
    <clipPath id="globeClip">
      <ellipse cx="252" cy="230" rx="168" ry="140"/>
    </clipPath>
  </defs>

  <!-- Globe body -->
  <ellipse cx="252" cy="230" rx="168" ry="140" fill="url(#globeGrad)"/>

  <!-- Globe grid lines clipped inside ellipse -->
  <g clip-path="url(#globeClip)" fill="none" stroke="#FF9040" stroke-width="2" opacity="0.7">
    <!-- Longitude ellipses -->
    <ellipse cx="252" cy="230" rx="168" ry="140"/>
    <ellipse cx="252" cy="230" rx="126" ry="140"/>
    <ellipse cx="252" cy="230" rx="76" ry="140"/>
    <ellipse cx="252" cy="230" rx="28" ry="140"/>
    <!-- Latitude lines -->
    <line x1="84" y1="160" x2="420" y2="160"/>
    <line x1="84" y1="230" x2="420" y2="230"/>
    <line x1="84" y1="300" x2="420" y2="300"/>
  </g>

  <!-- Globe outline -->
  <ellipse cx="252" cy="230" rx="168" ry="140" fill="none" stroke="#FF9040" stroke-width="2" opacity="0.5"/>

  <!-- Figure "2" in white -->
  <path d="
    M 152 204
    Q 152 164 182 152
    Q 204 144 224 150
    Q 252 158 254 182
    Q 258 204 240 222
    Q 228 234 208 250
    L 174 282
    L 258 282
    L 258 308
    L 144 308
    L 144 284
    L 198 238
    Q 220 220 226 206
    Q 232 192 224 180
    Q 216 170 200 171
    Q 180 172 178 192
    L 178 204 Z
  " fill="white"/>

  <!-- Figure "1" in white -->
  <rect x="270" y="152" width="34" height="156" rx="4" fill="white"/>
  <rect x="252" y="152" width="70" height="30" rx="4" fill="white"/>

  <!-- Orange ball / head -->
  <circle cx="248" cy="110" r="46" fill="url(#ballGrad)"/>

  <!-- COLÉGIO text arc top-right -->
  <path id="arcTop" d="M 108 188 A 190 190 0 0 1 430 188" fill="none"/>
  <text font-family="'Arial Black', 'Franklin Gothic Heavy', sans-serif" font-weight="900" font-size="44" fill="#CC2200" letter-spacing="1">
    <textPath href="#arcTop" startOffset="6%">COLÉGIO</textPath>
  </text>

  <!-- 21 DE ABRIL text arc bottom-left -->
  <path id="arcBot" d="M 62 300 A 212 212 0 0 0 432 300" fill="none"/>
  <text font-family="'Arial Black', 'Franklin Gothic Heavy', sans-serif" font-weight="900" font-size="42" fill="#CC2200" letter-spacing="0.5">
    <textPath href="#arcBot" startOffset="3%">21 DE ABRIL</textPath>
  </text>
</svg>
