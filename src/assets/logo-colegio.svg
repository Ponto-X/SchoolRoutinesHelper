<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
<defs>
  <radialGradient id="ball" cx="38%" cy="32%" r="60%">
    <stop offset="0%" stop-color="#FFE066"/>
    <stop offset="45%" stop-color="#FFA020"/>
    <stop offset="100%" stop-color="#E05500"/>
  </radialGradient>
  <radialGradient id="globe" cx="38%" cy="30%" r="65%">
    <stop offset="0%" stop-color="#FF7020"/>
    <stop offset="100%" stop-color="#CC2200"/>
  </radialGradient>
  <clipPath id="clip">
    <ellipse cx="200" cy="252" rx="155" ry="128"/>
  </clipPath>
</defs>

<!-- Globe -->
<ellipse cx="200" cy="252" rx="155" ry="128" fill="url(#globe)"/>

<!-- Grid lines clipped to globe -->
<g clip-path="url(#clip)" fill="none" stroke="#FF9040" stroke-width="2" opacity="0.65">
  <ellipse cx="200" cy="252" rx="155" ry="128"/>
  <ellipse cx="200" cy="252" rx="115" ry="128"/>
  <ellipse cx="200" cy="252" rx="68"  ry="128"/>
  <ellipse cx="200" cy="252" rx="24"  ry="128"/>
  <line x1="45"  y1="192" x2="355" y2="192"/>
  <line x1="45"  y1="252" x2="355" y2="252"/>
  <line x1="45"  y1="312" x2="355" y2="312"/>
</g>

<!-- "2" in white -->
<path d="
  M 118 272
  L 118 252 Q 118 208 148 196 Q 165 189 184 193
  Q 210 199 214 220 Q 218 239 204 256
  Q 194 267 174 282 L 142 310 L 218 310 L 218 332 L 112 332
  L 112 310 L 162 272 Q 184 254 190 240
  Q 196 226 188 217 Q 180 208 165 209
  Q 148 210 146 228 L 146 240 Z
" fill="white"/>

<!-- "1" in white -->
<rect x="228" y="193" width="30" height="139" rx="3" fill="white"/>
<rect x="212" y="193" width="62" height="26"  rx="3" fill="white"/>

<!-- Ball -->
<circle cx="200" cy="118" r="44" fill="url(#ball)"/>
<circle cx="184" cy="103" r="13" fill="#FFE88A" opacity="0.75"/>

<!-- COLÉGIO arc — top right, outside globe -->
<path id="top" d="M 74 202 A 178 178 0 0 1 358 202" fill="none"/>
<text font-family="'Arial Black','Franklin Gothic Heavy',Arial,sans-serif"
      font-weight="900" font-size="40" fill="#CC2200" letter-spacing="1">
  <textPath href="#top" startOffset="7%">COLÉGIO</textPath>
</text>

<!-- 21 DE ABRIL arc — bottom, outside globe -->
<path id="bot" d="M 28 318 A 200 200 0 0 0 372 318" fill="none"/>
<text font-family="'Arial Black','Franklin Gothic Heavy',Arial,sans-serif"
      font-weight="900" font-size="37" fill="#CC2200" letter-spacing="0.5">
  <textPath href="#bot" startOffset="4%">21 DE ABRIL</textPath>
</text>
</svg>
